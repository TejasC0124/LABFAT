apiVersion: v1
kind: ConfigMap
metadata:
  name: html-content
data:
  index.html: |
    <!DOCTYPE html>
    <html>
        <head>
            <title>Gold-Rate-Graph</title>
            <style>
            body{
                text-align:center;
                font-family:Times New Roman;
                background-color:#af0d0d;
            }
            h1{
                color:#0ef777;
            }
            </style>
            </head>
    <body>
        <div style="width: 80%; margin: auto;">
            <h2>Gold Rate Trend (Random Data)</h2>
            <img src="Figure_1.png">Figure</img>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-demo   
  template:
    metadata:
      labels:
        app: html-demo 
    spec:
      containers:     
      - name: html-demo-container
        image: nginx:alpine  # Using standard nginx to serve the injected file
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: html-content
---
apiVersion: v1
kind: Service
metadata:
  name: html-demo-service
spec:
  selector:
    app: html-demo
  ports:               
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
